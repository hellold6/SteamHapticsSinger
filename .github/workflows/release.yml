name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libhidapi-dev pkg-config

      - name: Build
        run: make

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-haptics-singer-linux
          path: steam-haptics-singer

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: steam-haptics-singer-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: steam-haptics-singer
          generate_release_notes: true
